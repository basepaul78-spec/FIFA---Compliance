  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Compliance AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: #38bdf8;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .badge {
            display: inline-block;
            background-color: #0284c7;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Official Portal</span>
        <h1>FIFA Compliance Assistant</h1>
        <p>Welcome to the official portal for FIFA Regulations, Clearing House, and Protection of Minors compliance queries.</p>
        <p>Click the chat button in the bottom right corner to start your consultation with the AI Assistant.</p>
    </div>

    <!-- Coze Web SDK (Sin bloque auth para evitar el error 502) -->
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>
    <script>
      new CozeWebSDK.WebChatClient({
        config: {
          bot_id: '7663564679269203973',
        },
        componentProps: {
          title: 'FIFA Compliance AI',
          lang: 'en',
        }
      });
    </script>
</body>
</html>
