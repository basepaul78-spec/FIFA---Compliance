 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Compliance AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #38bdf8;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background-color: #0284c7;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .chat-frame {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 12px;
            background-color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Official Portal</span>
        <h1>FIFA Compliance Assistant</h1>
        <p>Welcome to the official portal for FIFA Regulations, Clearing House, and Protection of Minors compliance queries.</p>
        
        <!-- Chat Embebido Directo -->
        <iframe 
            src="https://www.coze.com/store/bot/7663564679269203973" 
            class="chat-frame"
            allow="microphone">
        </iframe>
    </div>
</body>
</html>
