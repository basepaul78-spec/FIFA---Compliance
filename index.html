 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Compliance AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            width: 100%;
            max-width: 900px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .badge {
            display: inline-block;
            background-color: #0284c7;
            color: #ffffff;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: 1.75rem;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
        }
        .chat-container {
            width: 100%;
            height: 650px;
            background: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="badge">Official Portal</span>
            <h1>FIFA Compliance Assistant</h1>
            <p>Official AI Portal for FIFA Regulations, Protection of Minors, and Clearing House Queries.</p>
        </div>
        <div class="chat-container">
            <iframe src="https://www.coze.com/store/bot/7663564679269203973" allow="microphone"></iframe>
        </div>
    </div>

</body>
</html>
